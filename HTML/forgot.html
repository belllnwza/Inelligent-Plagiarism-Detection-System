<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - AI Homechecker</title>
<link rel="stylesheet" href="../CSS/style1.css">
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
        <img src="../Img/width_1.png" alt="AI Homechecker Logo" class="main-logo">
    </div>
    <div class="nav-buttons">
      <button class="home-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1h-6v-7H10v7H4a1 1 0 0 1-1-1V9.5z"/>
        </svg>
        Home
      </button>
      <button class="desc-btn">Description</button>
      <button class="logout-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log-Out
      </button>
    </div>
  </div>
  <div class="header-bottom">
    <span class="status-text">Reset your password...</span>
    <button class="lang-btn" onclick="toggleLanguage()">EN/TH</button>
  </div>
</header>

<div class="login-container">
  <div class="login-box">

    <!-- Lock Icon -->
    <div class="profile-circle">
      <svg class="avatar-placeholder" viewBox="0 0 24 24" fill="#b084ff" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-8-2a3 3 0 1 1 6 0v2h-6V6zm4 10.7V18h-2v-1.3a2 2 0 1 1 2 0z"/>
      </svg>
    </div>

    <h2 id="forgot-title">RESET PASSWORD</h2>

    <div class="input-wrapper">
      <input type="text" id="username" placeholder="Enter your username..." autocomplete="off">
    </div>

    <div class="input-wrapper">
      <input type="password" id="new-password" placeholder="Enter new password..." autocomplete="new-password">
    </div>

    <div class="input-wrapper">
      <input type="password" id="confirm-password" placeholder="Confirm new password..." autocomplete="new-password">
    </div>

    <button class="login-btn" onclick="handleReset()" id="reset-btn">RESET PASSWORD</button>

    <p style="margin-top:16px;font-size:14px;color:#888;">
      Remember your password?
      <a href="login1.html" class="forgot" style="color:#b084ff;display:inline;" id="back-login">Back to Log In</a>
    </p>

  </div>
</div>

<script src="../JS/forgot.js"></script>
</body>
</html>
