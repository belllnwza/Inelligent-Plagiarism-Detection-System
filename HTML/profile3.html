<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>
<link rel="stylesheet" href="../CSS/style3.css">
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
        <img src="../Img/width_3.png" alt="AI Homechecker Logo" class="main-logo">
    </div>
    <div class="nav-buttons">
      <button class="home-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1h-6v-7H10v7H4a1 1 0 0 1-1-1V9.5z"/>
        </svg> Home
      </button>
      <button class="desc-btn">Description</button>
      <button class="logout-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg> Log-Out
      </button>
    </div>
  </div>
  <div class="header-bottom">
    <span class="status-text">Ready to inspect work...</span>
    <button class="lang-btn" onclick="toggleLanguage()">EN/TH</button>
  </div>
</header>


<div class="profile-container">
  <div class="profile-circle" id="profile-avatar">
    <img id="profile-img" class="avatar-image" src="" alt="Profile">
    
    <svg class="avatar-placeholder solid-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="8" r="4"/>
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    </svg>
  </div>

  <h2 id="profile-name">username 1</h2>

  <div class="history-section">
    <h3 id="history-title">History...</h3>
    <div id="history-list">
      <div class="history-item template" style="display:none;">
        <div class="file-info">
          <div class="file-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a75cff" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="file-name">Example File</div>
        </div>
        <div class="file-date">DD/MM/YY</div>
      </div>
    </div>
  </div>
</div>

<script src="../JS/script3.js"></script>
</body>
</html>
