<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<link rel="stylesheet" href="../CSS/style1.css">
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
        <img src="../Img/width_1.png" alt="AI Homechecker Logo" class="main-logo">
    </div>
    <div class="nav-buttons">
      <button class="home-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1h-6v-7H10v7H4a1 1 0 0 1-1-1V9.5z"/>
        </svg>
        Home
      </button>
      <button class="desc-btn">Description</button>
      <button class="logout-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log-Out
      </button>
    </div>
  </div>

  <div class="header-bottom">
    <span class="status-text">Ready to inspect work...</span>
    <button class="lang-btn" onclick="toggleLanguage()">EN/TH</button>
  </div>
</header>

<div class="login-container">
  <div class="login-box">

    <!-- Profile Circle -->
<div class="profile-circle" id="profile-avatar">
  <img id="profile-img" class="avatar-image" src="" alt="Profile" onerror="this.style.display='none'">
  
  <!-- ปรับ SVG ให้เป็นทรงมนทึบ (Solid) และใช้สีม่วงเดิม -->
  <svg class="avatar-placeholder" viewBox="0 0 24 24" fill="#b084ff" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
  </svg>
</div>

    <h2 id="login-title">LOG-IN</h2>

    <div class="input-wrapper">
      <input type="text" id="username" placeholder="Enter your name...">
    </div>

    <div class="input-wrapper">
      <input type="password" id="password" placeholder="Enter your password..." autocomplete="current-password">
    </div>

    <a href="#" class="forgot" id="forgot-text">forgot your password</a>
    <button class="login-btn" onclick="handleLogin()" id="login-btn">LOG-IN</button>
    <p style="margin-top:16px;font-size:14px;color:#888;">
      <a href="signup.html" class="forgot" id="signup-link" style="color:#b084ff;display:inline;">Don't have an account? Sign Up</a>
    </p>
  </div>
</div>

<script src="../JS/script1.js"></script>
</body>
</html>
